name: Sync Publications

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

env:
  PUBLICATIONS_SOURCE_URL: ${{ vars.PUBLICATIONS_SOURCE_URL }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Refresh generated content
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run refresh:content

      - name: Commit updated archive
        run: |
          if git diff --quiet; then
            echo "No publication changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications-source.bib assets/data/publication-archive.json files/Shuo_SUN_CV.pdf
          git commit -m "chore: refresh publications and cv"
          git push
