<svg xmlns="http://www.w3.org/2000/svg" width="360" height="140" viewBox="0 0 360 140" role="img" aria-labelledby="title desc">
  <title id="title">MIT CCI wordmark</title>
  <desc id="desc">Stylized local MIT Center for Collective Intelligence identity badge.</desc>
  <rect width="360" height="140" rx="28" fill="#ffffff"/>
  <rect x="14" y="14" width="332" height="112" rx="20" fill="#fff3f0" stroke="#8b2e1d" stroke-opacity=".16"/>
  <g fill="#8b2e1d">
    <rect x="34" y="32" width="12" height="48" rx="2"/>
    <rect x="50" y="32" width="12" height="48" rx="2"/>
    <rect x="66" y="32" width="28" height="12" rx="2"/>
    <rect x="82" y="32" width="12" height="48" rx="2"/>
  </g>
  <text x="112" y="58" fill="#1b1b18" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="1.5">MIT CCI</text>
  <text x="112" y="88" fill="#675b58" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="1.4">CENTER FOR COLLECTIVE INTELLIGENCE</text>
</svg>
